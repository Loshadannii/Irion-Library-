<style>
  :root {
    --cream: #F5F0E8;
    --dark: #1A1208;
    --brown: #6B3F1A;
    --gold: #C9A84C;
    --rust: #B94F2A;
    --paper: #EDE8DC;
    --ink: #2C1810;
    --muted: #8A7A6A;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--dark);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 20;
    opacity: 0.5;
  }

  nav {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
    padding: 1.2rem 4rem;
    background: rgba(245, 240, 232, 0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(107, 63, 26, 0.12);
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--dark);
    letter-spacing: -1px;
    text-decoration: none;
  }

  .nav-logo span { color: var(--gold); font-style: italic; }

  .nav-links { display: flex; align-items: center; gap: 2rem; }

  .nav-links a {
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    position: relative;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: -4px;
    width: 0;
    height: 1.5px;
    background: var(--gold);
    transition: width 0.25s ease;
  }

  .nav-links a:hover::after { width: 100%; }

  .reader-profile {
    display: none;
    align-items: center;
    gap: 0.65rem;
    color: var(--ink);
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .reader-profile.visible { display: flex; }

  .reader-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--paper);
    border: 1px solid rgba(107, 63, 26, 0.18);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    object-fit: cover;
  }

  .library-hero {
    padding: 6.5rem 4rem 4rem;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: end;
    gap: 3rem;
  }

  .eyebrow {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--rust);
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1rem;
  }

  .eyebrow::before {
    content: '';
    width: 32px;
    height: 1.5px;
    background: var(--rust);
    display: block;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 7vw, 6rem);
    line-height: 0.98;
    letter-spacing: -2px;
    max-width: 760px;
  }

  h1 em { color: var(--brown); font-style: italic; }

  .hero-copy {
    color: var(--muted);
    line-height: 1.8;
    max-width: 430px;
    font-weight: 300;
  }

  .library-wrap { padding: 0 4rem 6rem; }

  .genre-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    margin-bottom: 2.5rem;
  }

  .genre-btn {
    border: 1px solid rgba(107, 63, 26, 0.22);
    background: rgba(237, 232, 220, 0.7);
    color: var(--ink);
    cursor: pointer;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.75rem 1rem;
    transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
  }

  .genre-btn:hover,
  .genre-btn.active {
    background: var(--dark);
    border-color: var(--dark);
    color: var(--cream);
  }

  .library-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 2.5rem;
  }

  .book-card {
    cursor: pointer;
    position: relative;
    transition: transform 0.3s ease;
  }

  .book-card:hover { transform: translateY(-8px); }

  .book-cover {
    width: 100%;
    aspect-ratio: 2 / 3;
    position: relative;
    overflow: hidden;
    background: var(--paper);
    margin-bottom: 1.2rem;
    box-shadow: 0 14px 35px rgba(26,18,8,0.08);
  }

  .book-cover-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
  }

  .book-card:hover .book-cover-img { transform: scale(1.05); }

  .book-tag {
    position: absolute;
    top: 0.8rem;
    left: 0.8rem;
    background: var(--rust);
    color: white;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.3rem 0.6rem;
  }

  .book-wishlist {
    position: absolute;
    top: 0.8rem;
    right: 0.8rem;
    width: 32px;
    height: 32px;
    background: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.95rem;
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .book-card:hover .book-wishlist { opacity: 1; }

  .book-genre {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--rust);
    font-weight: 700;
    margin-bottom: 0.4rem;
  }

  .book-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 0.25rem;
    line-height: 1.3;
  }

  .book-author {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.7rem;
  }

  .book-rating {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    margin-bottom: 0.6rem;
  }

  .rating-score {
    color: var(--gold);
    font-size: 0.78rem;
    font-weight: 700;
  }

  .rating-count {
    font-size: 0.7rem;
    color: var(--muted);
  }

  .book-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .book-price {
    font-size: 1rem;
    font-weight: 700;
    color: var(--brown);
  }

  .book-price .original {
    text-decoration: line-through;
    color: var(--muted);
    font-size: 0.8rem;
    margin-right: 0.3rem;
    font-weight: 400;
  }

  .btn-add-cart {
    background: var(--dark);
    color: var(--cream);
    border: none;
    width: 36px;
    height: 36px;
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-add-cart:hover { background: var(--brown); }

  footer {
    background: var(--dark);
    color: rgba(245,240,232,0.55);
    padding: 2rem 4rem;
    display: flex;
    justify-content: space-between;
    gap: 2rem;
    font-size: 0.78rem;
  }

  footer a { color: var(--gold); text-decoration: none; }

  @media (max-width: 1100px) {
    .library-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }

  @media (max-width: 900px) {
    nav, .library-hero, .library-wrap, footer { padding-left: 2rem; padding-right: 2rem; }
    .library-hero { grid-template-columns: 1fr; padding-top: 4.5rem; }
  }

  @media (max-width: 700px) {
    nav { align-items: flex-start; flex-direction: column; }
    .nav-links { flex-wrap: wrap; gap: 1rem; }
    .library-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1.6rem; }
    footer { flex-direction: column; }
  }

  @media (max-width: 430px) {
    .library-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

  const grid = document.getElementById('libraryGrid');
  const genreFilter = document.getElementById('genreFilter');

  function renderBooks(visibleBooks) {
    grid.innerHTML = visibleBooks.map(book => `
    <article class="book-card">
      <div class="book-cover">
        <img class="book-cover-img" src="https://covers.openlibrary.org/b/isbn/${book.isbn}-L.jpg" alt="${book.title} cover">
        <div class="book-tag">${book.tag}</div>
        <button class="book-wishlist" title="Add to wishlist">♡</button>
      </div>
      <div class="book-genre">${book.genre}</div>
      <h2 class="book-title">${book.title}</h2>
      <div class="book-author">${book.author}</div>
      <div class="book-rating">
        <span class="rating-score">${book.rating.toFixed(1)} / 5</span>
        <span class="rating-count">(${book.reviews.toLocaleString()} reviews)</span>
      </div>
      <div class="book-footer">
        <div class="book-price"><span class="original">$${book.oldPrice.toFixed(2)}</span>$${book.price.toFixed(2)}</div>
        <button class="btn-add-cart">+</button>
      </div>
    </article>
    `).join('');
  }

  function renderGenreButtons() {
    const genres = ['All', ...new Set(books.map(book => book.genre))];

    genreFilter.innerHTML = genres.map((genre, index) => `
      <button class="genre-btn${index === 0 ? ' active' : ''}" type="button" data-genre="${genre}">
        ${genre}
      </button>
    `).join('');

    genreFilter.addEventListener('click', event => {
      const button = event.target.closest('.genre-btn');
      if (!button) return;

      const selectedGenre = button.dataset.genre;
      document.querySelectorAll('.genre-btn').forEach(genreButton => {
        genreButton.classList.toggle('active', genreButton === button);
      });

      renderBooks(selectedGenre === 'All' ? books : books.filter(book => book.genre === selectedGenre));
    });
  }

  renderGenreButtons();
  renderBooks(books);

  function updateReaderProfile() {
    const roomName = localStorage.getItem('irionRoomName');
    const avatarSrc = localStorage.getItem('irionAvatar') || 'pie.png';
    const profile = document.getElementById('readerProfile');
    const roomNameLabel = document.getElementById('readerRoomName');
    const avatar = document.getElementById('readerAvatar');

    if (!roomName || !profile || !roomNameLabel || !avatar) return;

    roomNameLabel.textContent = roomName;
    avatar.src = avatarSrc;
    avatar.alt = `${roomName} character`;
    profile.classList.add('visible');
  }

  updateReaderProfile();
</script>
